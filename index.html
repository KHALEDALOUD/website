<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHALED ALOUD | Official Website</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f7f9fc; display: flex; justify-content: center; align-items: center; height: 100vh; color: #333; }
        .card { background-color: white; padding: 3rem 2rem; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; max-width: 450px; width: 90%; }
        h1 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 2rem; color: #1a1a1a; margin-bottom: 0.5rem; }
        h1 span { font-weight: 700; color: #004a99; }
        .role { text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; color: #666; margin-bottom: 2.5rem; }
        .coming-soon { font-weight: 300; font-size: 1.1rem; color: #444; margin-top: 1rem; position: relative; display: inline-block; }
        .coming-soon:after { content: ''; display: block; width: 50px; height: 1px; background: #004a99; margin: 10px auto; }
        .under-construction { font-size: 1.4rem; color: #222; margin-top: 0.5rem; font-weight: 600; }
        .contact { font-size: 0.9rem; color: #888; margin-top: 3rem; }
        .contact a { color: #004a99; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <h1>KHALED <span>ALOUD</span></h1>
        <p class="role">Journalist & Content Producer</p>
        <p class="coming-soon">Official Website</p>
        <p class="under-construction">الموقع تحت الإنشاء..</p>
    </div>
</body>
</html>
